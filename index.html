<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BhaktiStock - Admin Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Utility Classes */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 selection:bg-blue-200">
    <div id="root"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = {
            initializeApp, getApps, getApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, signOut,
            getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (!containerRef.current || !window.lucide) return;
                let kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                if (kebabName.endsWith('-2')) {
                    kebabName = kebabName.replace('-2', '');
                }
                containerRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                window.lucide.createIcons({
                    root: containerRef.current,
                    attrs: { width: size, height: size, class: className }
                });
            }, [name, size, className]);
            
            return <span ref={containerRef} className="contents" style={{ display: 'contents' }} />;
        };

        const manualFirebaseConfig = {
            apiKey: "AIzaSyCkWXVNjDVfLk9xllTD3IsXMwnbyvQeNrE",
            authDomain: "bhakti-stock.firebaseapp.com",
            projectId: "bhakti-stock",
            storageBucket: "bhakti-stock.firebasestorage.app",
            messagingSenderId: "1027335051516",
            appId: "1:1027335051516:web:46fb07f9f744ec12a69f79",
            measurementId: "G-T2P45ZE381"
        };

        const firebaseConfig = typeof __firebase_config !== "undefined" ? JSON.parse(__firebase_config) : manualFirebaseConfig;
        const appId = typeof __app_id !== "undefined" ? __app_id : "mobistock-default";
        const isDemoMode = firebaseConfig.apiKey === "YOUR_API_KEY_HERE" || !firebaseConfig.apiKey;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('inventory'); 
            
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [currentItem, setCurrentItem] = useState(null);

            const [isMovementModalOpen, setIsMovementModalOpen] = useState(false);
            const [movementItem, setMovementItem] = useState(null);
            const [movementType, setMovementType] = useState('in'); 
            const [movementQuantity, setMovementQuantity] = useState(1);

            const [loginError, setLoginError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            
            const [fbLoaded, setFbLoaded] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            useEffect(() => {
                const setupFirebase = () => {
                    if (!isDemoMode && window.FB) {
                        let app = window.FB.getApps().length === 0 ? window.FB.initializeApp(firebaseConfig) : window.FB.getApp();
                        setAuth(window.FB.getAuth(app));
                        setDb(window.FB.getFirestore(app));
                    }
                    setFbLoaded(true);
                };
                if (window.FB) setupFirebase();
                else {
                    const timer = setInterval(() => {
                        if (window.FB) { setupFirebase(); clearInterval(timer); }
                    }, 50);
                    return () => clearInterval(timer);
                }
            }, []);

            useEffect(() => {
                if (!fbLoaded) return;
                if (isDemoMode) { 
                    setUser({ uid: 'local-demo-user', isAnonymous: true }); 
                    setIsLoading(false); 
                    return; 
                }

                if (window.FB && auth) {
                    const unsubscribe = window.FB.onAuthStateChanged(auth, async (currentUser) => {
                        if (!currentUser) {
                            try {
                                await window.FB.signInAnonymously(auth);
                            } catch (err) {
                                console.error("Anonymous connection failed:", err);
                            }
                        } else {
                            setUser(currentUser);
                            setIsLoading(false);
                        }
                    });
                    return () => unsubscribe();
                }
            }, [fbLoaded, auth]);

            useEffect(() => {
                if (!user || user.isAnonymous || (!isDemoMode && !fbLoaded)) return;
                
                if (isDemoMode) {
                    setInventory(JSON.parse(localStorage.getItem('mobistock_inv') || '[]'));
                    setTransactions(JSON.parse(localStorage.getItem('mobistock_tx') || '[]'));
                    setIsLoading(false);
                    return;
                }

                if (!db) return;

                const inventoryRef = window.FB.collection(db, 'artifacts', appId, 'inventory');
                const unsubscribeInv = window.FB.onSnapshot(inventoryRef, (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    setInventory(items);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Inventory sync broken:", error);
                    setIsLoading(false);
                });

                const txRef = window.FB.collection(db, 'artifacts', appId, 'transactions');
                const unsubscribeTx = window.FB.onSnapshot(txRef, (snapshot) => {
                    const txs = [];
                    snapshot.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
                    txs.sort((a, b) => b.timestamp - a.timestamp); 
                    setTransactions(txs);
                }, (error) => {
                    console.error("Transactions tracking broken:", error);
                });

                return () => {
                    unsubscribeInv && unsubscribeInv();
                    unsubscribeTx && unsubscribeTx();
                };
            }, [user, db, fbLoaded]);

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setIsLoggingIn(true);

                const formData = new FormData(e.target);
                const email = formData.get('email');
                const password = formData.get('password');

                if (isDemoMode) {
                    if (email === 'admin@bhaktistock.com' && password === 'admin123') {
                        setUser({ uid: 'demo-admin-uid', email: email, isAnonymous: false });
                    } else {
                        setLoginError('Invalid credentials! Hint: Use admin@bhaktistock.com and admin123');
                    }
                    setIsLoggingIn(false);
                    return;
                }

                if (window.FB && auth) {
                    try {
                        await window.FB.signInWithEmailAndPassword(auth, email, password);
                    } catch (err) {
                        console.error("Authentication Error Details:", err);
                        setLoginError('Access Denied. Check your admin credentials.');
                    } finally {
                        setIsLoggingIn(false);
                    }
                }
            };

            const handleAdminLogout = async () => {
                setIsLoading(true);
                if (isDemoMode) {
                    setUser({ uid: 'local-demo-user', isAnonymous: true });
                    setInventory([]);
                    setTransactions([]);
                    setIsLoading(false);
                    return;
                }
                if (window.FB && auth) {
                    try {
                        await window.FB.signOut(auth);
                    } catch (err) {
                        console.error("Logout execution error:", err);
                        setIsLoading(false);
                    }
                }
            };

            const saveItem = async (e) => {
                e.preventDefault();
                if (!user || user.isAnonymous) return;
                
                const formData = new FormData(e.target);
                const itemData = {
                    name: formData.get('name'),
                    brand: formData.get('brand'),
                    sku: formData.get('sku'),
                    category: formData.get('category'),
                    price: parseFloat(formData.get('price')) || 0,
                    quantity: parseInt(formData.get('quantity')) || 0,
                };

                if (isDemoMode) {
                    let newInv = [...inventory];
                    if (currentItem) {
                        newInv = newInv.map(i => i.id === currentItem.id ? { id: currentItem.id, ...itemData } : i);
                    } else {
                        newInv.push({ id: Date.now().toString(), ...itemData });
                    }
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                } else if (db) {
                    try {
                        if (currentItem) {
                            await window.FB.updateDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', currentItem.id), itemData);
                        } else {
                            const newId = Date.now().toString();
                            await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', newId), { id: newId, ...itemData });
                        }
                    } catch (err) {
                        console.error("Save error:", err);
                    }
                }
                setIsItemModalOpen(false);
                setCurrentItem(null);
            };

            const deleteItem = async (id) => {
                if (!user || user.isAnonymous) return;
                if (confirm("Permanently delete this item from the catalog?")) {
                    if (isDemoMode) {
                        const newInv = inventory.filter(i => i.id !== id);
                        setInventory(newInv);
                        localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                    } else if (db) {
                        try {
                            await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', id));
                        } catch (err) {
                            console.error("Delete execution error:", err);
                        }
                    }
                }
            };

            const handleStockMovement = async (e) => {
                e.preventDefault();
                if (!user || user.isAnonymous || !movementItem) return;

                const currentQty = movementItem.quantity || 0;
                const change = parseInt(movementQuantity) || 0;
                const newQuantity = movementType === 'in' ? currentQty + change : Math.max(0, currentQty - change);

                const txData = {
                    itemId: movementItem.id,
                    itemName: movementItem.name,
                    sku: movementItem.sku,
                    type: movementType,
                    quantity: change,
                    price: movementItem.price || 0,
                    totalValue: change * (movementItem.price || 0),
                    timestamp: Date.now()
                };

                if (isDemoMode) {
                    const newInv = inventory.map(i => i.id === movementItem.id ? { ...i, quantity: newQuantity } : i);
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));

                    const updatedTxs = [{ id: Date.now().toString(), ...txData }, ...transactions];
                    setTransactions(updatedTxs);
                    localStorage.setItem('mobistock_tx', JSON.stringify(updatedTxs));
                } else if (db) {
                    try {
                        await window.FB.updateDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', movementItem.id), { quantity: newQuantity });
                        await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'transactions', Date.now().toString()), txData);
                    } catch (err) {
                        console.error("Transaction deployment execution error:", err);
                    }
                }

                setIsMovementModalOpen(false);
                setMovementItem(null);
                setMovementQuantity(1);
            };

            const getDailyMetrics = () => {
                const todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);
                const startTimestamp = todayStart.getTime();

                const todayTx = transactions.filter(t => t.timestamp >= startTimestamp);
                let totalInward = 0, totalOutwardSales = 0, dailyRevenue = 0;

                todayTx.forEach(t => {
                    if (t.type === 'in') totalInward += t.quantity;
                    else if (t.type === 'out') {
                        totalOutwardSales += t.quantity;
                        dailyRevenue += (t.totalValue || (t.quantity * t.price));
                    }
                });

                return { transactions: todayTx, totalInward, totalOutwardSales, dailyRevenue };
            };

            const dailyReport = getDailyMetrics();
            const lowStockCount = inventory.filter(item => item.quantity <= 5).length;

            // Excel Downloader Engine Function
            const exportToExcel = () => {
                if (dailyReport.transactions.length === 0) {
                    alert("No operation logs captured for today to map into an Excel document.");
                    return;
                }

                // Map clean, row data array for Excel conversion
                const excelRows = dailyReport.transactions.map((tx) => ({
                    "Timestamp": new Date(tx.timestamp).toLocaleTimeString(),
                    "Product Name": tx.itemName,
                    "SKU Reference Code": tx.sku,
                    "Action Type": tx.type === 'in' ? 'Inward Ingest' : 'Outward Sale',
                    "Delta Quantity": tx.quantity,
                    "Unit Cost ($)": tx.price,
                    "Total Value Cross ($)": parseFloat((tx.totalValue || (tx.quantity * tx.price)).toFixed(2))
                }));

                // Append empty parsing spacing row followed by system metrics logs summary card metrics arrays
                excelRows.push({}); 
                excelRows.push({ "Timestamp": "SUMMARY DATA SPECIFICATION LEDGER" });
                excelRows.push({ "Timestamp": "Total Combined Daily Revenue ($)", "Product Name": parseFloat(dailyReport.dailyRevenue.toFixed(2)) });
                excelRows.push({ "Timestamp": "Total Volume Sold Outward (Units)", "Product Name": dailyReport.totalOutwardSales });
                excelRows.push({ "Timestamp": "Total Volume Ingested Inward (Units)", "Product Name": dailyReport.totalInward });

                // Construct spreadsheet entity instances safely via SheetJS utils
                const worksheet = XLSX.utils.json_to_sheet(excelRows);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Daily Ledger Feed");

                // Download execution pipeline trigger
                const todayString = new Date().toISOString().split('T')[0];
                XLSX.writeFile(workbook, `BhaktiStock_Daily_Report_${todayString}.xlsx`);
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-gray-500 font-bold mt-4 tracking-wide">Syncing Security Handshake Protocol...</p>
                    </div>
                );
            }

            if (!user || user.isAnonymous) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-gray-100">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 p-8 space-y-6 animate-fade-in">
                            <div className="text-center space-y-2">
                                <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto shadow-sm">
                                    <Icon name="Lock" size={32} />
                                </div>
                                <h2 className="text-2xl font-black text-gray-900 tracking-tight">BhaktiStock Admin</h2>
                                <p className="text-gray-400 text-sm">Please sign in below to open the real-time stock matrix dashboard.</p>
                            </div>

                            {loginError && (
                                <div className="p-4 bg-red-50 border border-red-200 text-red-700 text-xs font-bold rounded-xl flex items-center gap-2">
                                    <Icon name="AlertCircle" size={16} className="text-re
