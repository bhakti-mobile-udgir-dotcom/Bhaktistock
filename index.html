<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BhaktiStock</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Utility Classes */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 selection:bg-blue-200">
    <div id="root"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = {
            initializeApp, getApps, getApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (!containerRef.current || !window.lucide) return;
                let kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                if (kebabName.endsWith('-2')) {
                    kebabName = kebabName.replace('-2', '');
                }
                containerRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                window.lucide.createIcons({
                    root: containerRef.current,
                    attrs: { width: size, height: size, class: className }
                });
            }, [name, size, className]);
            
            return <span ref={containerRef} className="contents" style={{ display: 'contents' }} />;
        };

        const manualFirebaseConfig = {
            apiKey: "AIzaSyCkWXVNjDVfLk9xllTD3IsXMwnbyvQeNrE",
            authDomain: "bhakti-stock.firebaseapp.com",
            projectId: "bhakti-stock",
            storageBucket: "bhakti-stock.firebasestorage.app",
            messagingSenderId: "1027335051516",
            appId: "1:1027335051516:web:46fb07f9f744ec12a69f79",
            measurementId: "G-T2P45ZE381"
        };

        const firebaseConfig = typeof __firebase_config !== "undefined" ? JSON.parse(__firebase_config) : manualFirebaseConfig;
        const appId = typeof __app_id !== "undefined" ? __app_id : "mobistock-default";
        const isDemoMode = firebaseConfig.apiKey === "YOUR_API_KEY_HERE" || !firebaseConfig.apiKey;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('inventory'); // 'inventory' or 'report'
            
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [currentItem, setCurrentItem] = useState(null);

            // Stock Movement States
            const [isMovementModalOpen, setIsMovementModalOpen] = useState(false);
            const [movementItem, setMovementItem] = useState(null);
            const [movementType, setMovementType] = useState('in'); // 'in' (Inward) or 'out' (Outward/Sale)
            const [movementQuantity, setMovementQuantity] = useState(1);
            
            const [fbLoaded, setFbLoaded] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            useEffect(() => {
                const setupFirebase = () => {
                    if (!isDemoMode && window.FB) {
                        let app = window.FB.getApps().length === 0 ? window.FB.initializeApp(firebaseConfig) : window.FB.getApp();
                        setAuth(window.FB.getAuth(app));
                        setDb(window.FB.getFirestore(app));
                    }
                    setFbLoaded(true);
                };
                if (window.FB) setupFirebase();
                else {
                    const timer = setInterval(() => {
                        if (window.FB) { setupFirebase(); clearInterval(timer); }
                    }, 50);
                    return () => clearInterval(timer);
                }
            }, []);

            useEffect(() => {
                if (!fbLoaded) return;
                if (isDemoMode) { setUser({ uid: 'local-demo-user' }); return; }

                if (window.FB && auth) {
                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(auth);
                            }
                        } catch (error) {
                            console.error("Auth error:", error);
                            setUser({ uid: 'local-fallback-user' }); 
                        }
                    };
                    initAuth();
                    const unsubscribe = window.FB.onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                }
            }, [fbLoaded, auth]);

            // Real-Time Syncing (Shared across devices)
            useEffect(() => {
                if (!user || (!isDemoMode && !fbLoaded)) return;
                
                if (isDemoMode) {
                    setInventory(JSON.parse(localStorage.getItem('mobistock_inv') || '[]'));
                    setTransactions(JSON.parse(localStorage.getItem('mobistock_tx') || '[]'));
                    setIsLoading(false);
                    return;
                }

                if (!db) return;

                const inventoryRef = window.FB.collection(db, 'artifacts', appId, 'inventory');
                const unsubscribeInv = window.FB.onSnapshot(inventoryRef, (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    setInventory(items);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Inventory sync error:", error);
                    setIsLoading(false);
                });

                const txRef = window.FB.collection(db, 'artifacts', appId, 'transactions');
                const unsubscribeTx = window.FB.onSnapshot(txRef, (snapshot) => {
                    const txs = [];
                    snapshot.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
                    txs.sort((a, b) => b.timestamp - a.timestamp); 
                    setTransactions(txs);
                }, (error) => {
                    console.error("Transactions sync error:", error);
                });

                return () => {
                    unsubscribeInv && unsubscribeInv();
                    unsubscribeTx && unsubscribeTx();
                };
            }, [user, db, fbLoaded]);

            const saveItem = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const formData = new FormData(e.target);
                const itemData = {
                    name: formData.get('name'),
                    brand: formData.get('brand'),
                    sku: formData.get('sku'),
                    category: formData.get('category'),
                    price: parseFloat(formData.get('price')) || 0,
                    quantity: parseInt(formData.get('quantity')) || 0,
                };

                if (isDemoMode) {
                    let newInv = [...inventory];
                    if (currentItem) {
                        newInv = newInv.map(i => i.id === currentItem.id ? { id: currentItem.id, ...itemData } : i);
                    } else {
                        newInv.push({ id: Date.now().toString(), ...itemData });
                    }
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                } else if (db) {
                    try {
                        if (currentItem) {
                            await window.FB.updateDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', currentItem.id), itemData);
                        } else {
                            const newId = Date.now().toString();
                            await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', newId), { id: newId, ...itemData });
                        }
                    } catch (err) {
                        console.error("Save error:", err);
                    }
                }
                setIsItemModalOpen(false);
                setCurrentItem(null);
            };

            const deleteItem = async (id) => {
                if (!user) return;
                if (confirm("Are you sure you want to delete this item?")) {
                    if (isDemoMode) {
                        const newInv = inventory.filter(i => i.id !== id);
                        setInventory(newInv);
                        localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                    } else if (db) {
                        try {
                            await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', id));
                        } catch (err) {
                            console.error("Delete error:", err);
                        }
                    }
                }
            };

            // Process Stock Inward / Outward (Sales)
            const handleStockMovement = async (e) => {
                e.preventDefault();
                if (!user || !movementItem) return;

                const currentQty = movementItem.quantity || 0;
                const change = parseInt(movementQuantity) || 0;
                
                // Calculate new quantity contextually
                const newQuantity = movementType === 'in' 
                    ? currentQty + change 
                    : Math.max(0, currentQty - change);

                const txData = {
                    itemId: movementItem.id,
                    itemName: movementItem.name,
                    sku: movementItem.sku,
                    type: movementType,
                    quantity: change,
                    price: movementItem.price || 0,
                    totalValue: change * (movementItem.price || 0),
                    timestamp: Date.now()
                };

                if (isDemoMode) {
                    const newInv = inventory.map(i => i.id === movementItem.id ? { ...i, quantity: newQuantity } : i);
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));

                    const updatedTxs = [{ id: Date.now().toString(), ...txData }, ...transactions];
                    setTransactions(updatedTxs);
                    localStorage.setItem('mobistock_tx', JSON.stringify(updatedTxs));
                } else if (db) {
                    try {
                        // Update stock level
                        await window.FB.updateDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', movementItem.id), { quantity: newQuantity });
                        // Record transactional history log
                        await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'transactions', Date.now().toString()), txData);
                    } catch (err) {
                        console.error("Stock movement error:", err);
                    }
                }

                setIsMovementModalOpen(false);
                setMovementItem(null);
                setMovementQuantity(1);
            };

            // Calculate metrics for Daily Reports
            const getDailyMetrics = () => {
                const todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);
                const startTimestamp = todayStart.getTime();

                const todayTx = transactions.filter(t => t.timestamp >= startTimestamp);
                
                let totalInward = 0;
                let totalOutwardSales = 0;
                let dailyRevenue = 0;

                todayTx.forEach(t => {
                    if (t.type === 'in') {
                        totalInward += t.quantity;
                    } else if (t.type === 'out') {
                        totalOutwardSales += t.quantity;
                        dailyRevenue += (t.totalValue || (t.quantity * t.price));
                    }
                });

                return {
                    transactions: todayTx,
                    totalInward,
                    totalOutwardSales,
                    dailyRevenue
                };
            };

            const dailyReport = getDailyMetrics();
            const lowStockCount = inventory.filter(item => item.quantity <= 5).length;

            return (
                <div className="min-h-screen pb-safe flex flex-col">
                    {/* Top Header navbar */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-40 px-6 py-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between shadow-sm">
                        <div className="flex items-center justify-between">
                            <h1 className="text-2xl font-black text-blue-600 tracking-tight flex items-center gap-2">
                                <Icon name="Package" className="text-blue-600" /> BhaktiStock
                            </h1>
                        </div>
                        
                        {/* Tab Switch Control Elements */}
                        <div className="flex bg-gray-100 p-1 rounded-xl self-center sm:self-auto">
                            <button 
                                onClick={() => setActiveTab('inventory')}
                                className={`px-4 py-2 font-bold text-sm rounded-lg flex items-center gap-2 transition-all ${activeTab === 'inventory' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}
                            >
                                <Icon name="Layers" size={16} /> Stock Board
                            </button>
                            <button 
                                onClick={() => setActiveTab('report')}
                                className={`px-4 py-2 font-bold text-sm rounded-lg flex items-center gap-2 transition-all relative ${activeTab === 'report' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}
                            >
                                <Icon name="TrendingUp" size={16} /> Daily Sales Report
                            </button>
                        </div>

                        <button 
                            onClick={() => { setCurrentItem(null); setIsItemModalOpen(true); }}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md active:scale-95"
                        >
                            <Icon name="Plus" size={18} /> Add Product
                        </button>
                    </header>

                    {/* Quick Metric Ribbon */}
                    <section className="bg-amber-50 border-b border-amber-200 px-6 py-2 flex items-center justify-between">
                        <div className="flex items-center gap-2 text-amber-800 text-sm font-medium">
                            <Icon name="AlertTriangle" size={16} className="text-amber-600" />
                            <span><strong>{lowStockCount} items</strong> are at or below low stock alert threshold (5 items left).</span>
                        </div>
                    </section>

                    {/* Dynamic View rendering switch routing */}
                    <main className="p-6 max-w-5xl mx-auto w-full flex-grow">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-gray-500 font-medium mt-4">Syncing live cloud database...</p>
                            </div>
                        ) : activeTab === 'inventory' ? (
                            /* INVENTORY LIST TAB VIEW MODULE */
                            inventory.length === 0 ? (
                                <div className="bg-white border border-dashed border-gray-300 rounded-2xl p-12 text-center">
                                    <Icon name="Inbox" size={48} className="mx-auto text-gray-400 mb-3" />
                                    <h3 className="text-lg font-bold text-gray-700">No stock found</h3>
                                    <p className="text-gray-400 text-sm mb-4">Add your first product to distribute configuration to all devices.</p>
                                </div>
                            ) : (
                                <div className="grid gap-4 sm:grid-cols-2 md:grid-cols-3">
                                    {inventory.map(item => {
                                        const isLowStock = item.quantity <= 5;
                                        return (
                                            <div key={item.id} className={`bg-white border rounded-2xl p-5 shadow-sm hover:shadow-md transition-all flex flex-col justify-between ${isLowStock ? 'border-amber-300 bg-amber-50/20' : 'border-gray-200'}`}>
                                                <div>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs bg-blue-50 text-blue-600 font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider">{item.category}</span>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setCurrentItem(item); setIsItemModalOpen(true); }} className="p-1.5 text-gray-500 hover:text-blue-600 rounded-lg hover:bg-gray-100"><Icon name="Edit" size={16} /></button>
                                                            <button onClick={() => deleteIt
