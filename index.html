<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BhaktiStock</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Utility Classes */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 selection:bg-blue-200">
    <div id="root"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = {
            initializeApp, getApps, getApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (!containerRef.current || !window.lucide) return;
                let kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                if (kebabName.endsWith('-2')) {
                    kebabName = kebabName.replace('-2', '');
                }
                containerRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                window.lucide.createIcons({
                    root: containerRef.current,
                    attrs: { width: size, height: size, class: className }
                });
            }, [name, size, className]);
            
            return <span ref={containerRef} className="contents" style={{ display: 'contents' }} />;
        };

        const manualFirebaseConfig = {
            apiKey: "AIzaSyCkWXVNjDVfLk9xllTD3IsXMwnbyvQeNrE",
            authDomain: "bhakti-stock.firebaseapp.com",
            projectId: "bhakti-stock",
            storageBucket: "bhakti-stock.firebasestorage.app",
            messagingSenderId: "1027335051516",
            appId: "1:1027335051516:web:46fb07f9f744ec12a69f79",
            measurementId: "G-T2P45ZE381"
        };

        const firebaseConfig = typeof __firebase_config !== "undefined" ? JSON.parse(__firebase_config) : manualFirebaseConfig;
        const appId = typeof __app_id !== "undefined" ? __app_id : "mobistock-default";
        const isDemoMode = firebaseConfig.apiKey === "YOUR_API_KEY_HERE" || !firebaseConfig.apiKey;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [currentItem, setCurrentItem] = useState(null);
            
            const [fbLoaded, setFbLoaded] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            useEffect(() => {
                const setupFirebase = () => {
                    if (!isDemoMode && window.FB) {
                        let app = window.FB.getApps().length === 0 ? window.FB.initializeApp(firebaseConfig) : window.FB.getApp();
                        setAuth(window.FB.getAuth(app));
                        setDb(window.FB.getFirestore(app));
                    }
                    setFbLoaded(true);
                };
                if (window.FB) setupFirebase();
                else {
                    const timer = setInterval(() => {
                        if (window.FB) { setupFirebase(); clearInterval(timer); }
                    }, 50);
                    return () => clearInterval(timer);
                }
            }, []);

            useEffect(() => {
                if (!fbLoaded) return;
                if (isDemoMode) { setUser({ uid: 'local-demo-user' }); return; }

                if (window.FB && auth) {
                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(auth);
                            }
                        } catch (error) {
                            console.error("Auth error:", error);
                            setUser({ uid: 'local-fallback-user' }); 
                        }
                    };
                    initAuth();
                    const unsubscribe = window.FB.onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                }
            }, [fbLoaded, auth]);

            // Real-Time Database Syncing (Fixed Shared Paths)
            useEffect(() => {
                if (!user || (!isDemoMode && !fbLoaded)) return;
                
                if (isDemoMode) {
                    setInventory(JSON.parse(localStorage.getItem('mobistock_inv') || '[]'));
                    setTransactions(JSON.parse(localStorage.getItem('mobistock_tx') || '[]'));
                    setIsLoading(false);
                    return;
                }

                if (!db) return;

                // Shared multi-device reference path
                const inventoryRef = window.FB.collection(db, 'artifacts', appId, 'inventory');
                const unsubscribeInv = window.FB.onSnapshot(inventoryRef, (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    setInventory(items);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Inventory sync error:", error);
                    setIsLoading(false);
                });

                // Shared multi-device reference path
                const txRef = window.FB.collection(db, 'artifacts', appId, 'transactions');
                const unsubscribeTx = window.FB.onSnapshot(txRef, (snapshot) => {
                    const txs = [];
                    snapshot.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
                    txs.sort((a, b) => b.timestamp - a.timestamp); 
                    setTransactions(txs);
                }, (error) => {
                    console.error("Transactions sync error:", error);
                });

                return () => {
                    unsubscribeInv && unsubscribeInv();
                    unsubscribeTx && unsubscribeTx();
                };
            }, [user, db, fbLoaded]);

            const saveItem = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const formData = new FormData(e.target);
                const itemData = {
                    name: formData.get('name'),
                    brand: formData.get('brand'),
                    sku: formData.get('sku'),
                    category: formData.get('category'),
                    price: parseFloat(formData.get('price')) || 0,
                    quantity: parseInt(formData.get('quantity')) || 0,
                };

                if (isDemoMode) {
                    let newInv = [...inventory];
                    if (currentItem) {
                        newInv = newInv.map(i => i.id === currentItem.id ? { id: currentItem.id, ...itemData } : i);
                    } else {
                        newInv.push({ id: Date.now().toString(), ...itemData });
                    }
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                } else if (db) {
                    try {
                        if (currentItem) {
                            await window.FB.updateDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', currentItem.id), itemData);
                        } else {
                            const newId = Date.now().toString();
                            await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', newId), { id: newId, ...itemData });
                        }
                    } catch (err) {
                        console.error("Save error:", err);
                    }
                }
                setIsItemModalOpen(false);
                setCurrentItem(null);
            };

            const deleteItem = async (id) => {
                if (!user) return;
                if (isDemoMode) {
                    const newInv = inventory.filter(i => i.id !== id);
                    setInventory(newInv);
                    localStorage.setItem('mobistock_inv', JSON.stringify(newInv));
                } else if (db) {
                    try {
                        await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'inventory', id));
                    } catch (err) {
                        console.error("Delete error:", err);
                    }
                }
            };

            return (
                <div className="min-h-screen pb-safe">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
                        <h1 className="text-2xl font-black text-blue-600 tracking-tight flex items-center gap-2">
                            <Icon name="Package" className="text-blue-600" /> BhaktiStock
                        </h1>
                        <button 
                            onClick={() => { setCurrentItem(null); setIsItemModalOpen(true); }}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-xl flex items-center gap-2 transition-all shadow-md active:scale-95"
                        >
                            <Icon name="Plus" size={18} /> Add Item
                        </button>
                    </header>

                    {/* Main Content Area */}
                    <main className="p-6 max-w-5xl mx-auto">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-gray-500 font-medium mt-4">Syncing live database...</p>
                            </div>
                        ) : inventory.length === 0 ? (
                            <div className="bg-white border border-dashed border-gray-300 rounded-2xl p-12 text-center">
                                <Icon name="Inbox" size={48} className="mx-auto text-gray-400 mb-3" />
                                <h3 className="text-lg font-bold text-gray-700">No stock found</h3>
                                <p className="text-gray-400 text-sm mb-4">Add your first product to distribute to all devices.</p>
                            </div>
                        ) : (
                            <div className="grid gap-4 sm:grid-cols-2 md:grid-cols-3">
                                {inventory.map(item => (
                                    <div key={item.id} className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all flex flex-col justify-between">
                                        <div>
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-xs bg-blue-50 text-blue-600 font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider">{item.category}</span>
                                                <div className="flex gap-1">
                                                    <button onClick={() => { setCurrentItem(item); setIsItemModalOpen(true); }} className="p-1.5 text-gray-500 hover:text-blue-600 rounded-lg hover:bg-gray-100"><Icon name="Edit" size={16} /></button>
                                                    <button onClick={() => deleteItem(item.id)} className="p-1.5 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50"><Icon name="Trash2" size={16} /></button>
                                                </div>
                                            </div>
                                            <h3 className="font-bold text-lg text-gray-900 leading-tight">{item.name}</h3>
                                            <p className="text-xs text-gray-400 font-mono mt-1">SKU: {item.sku} | {item.brand}</p>
                                        </div>
                                        <div className="flex justify-between items-baseline mt-6 pt-3 border-t border-gray-100">
                                            <span className="text-xl font-black text-gray-900">${item.price}</span>
                                            <span className={`text-sm font-bold ${item.quantity > 5 ? 'text-emerald-600' : 'text-amber-600'}`}>{item.quantity} in stock</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Add/Edit Modal */}
                    {isItemModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsItemModalOpen(false)} />
                            <form onSubmit={saveItem} className="relative w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden animate-slide-up">
                                <div className="px-6 py-4 flex justify-between items-center border-b border-gray-100">
                                    <h3 className="text-lg font-bold text-gray-900">{currentItem ? 'Edit Product' : 'Add Product'}</h3>
                                    <button type="button" onClick={() => setIsItemModalOpen(false)} className="p-2 text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full"><Icon name="X" size={18} /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Item Name</label>
                                        <input name="name" defaultValue={currentItem?.name} required className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Brand</label>
                                            <input name="brand" defaultValue={currentItem?.brand} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">SKU</label>
                                            <input name="sku" defaultValue={currentItem?.sku} required className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Category</label>
                                        <input name="category" defaultValue={currentItem?.category} placeholder="e.g., Smartphones" required className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Price ($)</label>
                                            <input type="number" step="0.01" name="price" defaultValue={currentItem?.price} required className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Quantity</label>
                                            <input type="number" name="quantity" defaultValue={currentItem?.quantity} required className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-100">
                                    <button type="button" onClick={() => setIsItemModalOpen(false)} className="px-4 py-2 text-gray-600 font-semibold hover:bg-gray-200 rounded-xl transition-all">Cancel</button>
                                    <button type="submit" className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all shadow-md">Save Product</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        } // Added missing closing brace for the App function component here

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
                            </script>
